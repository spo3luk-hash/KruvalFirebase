<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Konverzace - Svět Durmstrangu</title>
    <link rel="stylesheet" href="css/zobrazeni-zpravy-forum.css">
    <link rel="stylesheet" href="css/editor-forum.css">
    <link rel="stylesheet" href="css/modalni-okna-forum.css">
</head>
<body>
    <!-- === NOVINKA: Panel pro připnutou zprávu === -->
    <div id="pinned-message-bar" style="display: none;">
        <div class="pinned-icon">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
        </div>
        <div id="pinned-message-content">
            Připnutá zpráva se zobrazí zde...
        </div>
        <button class="unpin-button" title="Odepnout zprávu">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
    </div>

    <header>
        <h1 id="conversation-with">Konverzace s: <span id="recipient-name">Načítání...</span></h1>
        <nav>
            <a href="soukrome-zpravy-forum.html">Zpět na všechny konverzace</a>
        </nav>
    </header>

    <main>
        <div id="messages-container">
            <!-- Zprávy se dynamicky načtou pomocí JavaScriptu -->
        </div>

        <div id="reply-form-container">
            <form id="message-reply-form">
                <h3>Napsat odpověď</h3>
                <div id="editor-wrapper"> 
                    <div class="editor-toolbar">
                        <!-- Tlačítka editoru se načtou pomocí JS -->
                    </div>
                    <div id="reply-content" class="editable-content" contenteditable="true" data-placeholder="Zde napište svou zprávu..."></div>
                </div>
                <button type="submit" class="custom-button">Odeslat zprávu</button>
            </form>
        </div>
    </main>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/editor-forum.js"></script>
    <script src="js/forum-utils.js"></script>
    <script src="js/modalniOknaForum.js"></script>
    <script src="js/zobrazeni-zpravy-forum.js"></script>
</body>
</html>
