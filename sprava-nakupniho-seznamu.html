<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Správa Nákupních Seznamů - Admin Centrum</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/admin-styles.css">
    <link rel="stylesheet" href="css/sprava-predmetu.css"> <!-- Používám existující styl pro předměty -->
    <link rel="stylesheet" href="css/custom-select.css">
</head>
<body>
    <div class="admin-container">
        <header class="admin-header">
            <h1>Admin Centrum</h1>
            <h2>Správa Nákupních Seznamů</h2>
            <div class="admin-header-actions">
                <a href="admin-centrum.html" class="action-btn"><i class="fas fa-arrow-left"></i> Zpět do centra</a>
            </div>
        </header>

        <main class="admin-main-content">
            <section id="seznamy-section">
                <div class="section-header">
                    <h3>Šablony nákupních seznamů</h3>
                    <button id="add-seznam-btn" class="action-btn primary"><i class="fas fa-plus"></i> Vytvořit novou šablonu</button>
                </div>
                <div id="seznamy-list-container" class="table-container">
                    <!-- Seznamy šablon se vygenerují zde -->
                </div>
            </section>
        </main>
    </div>

    <!-- Modální okno pro vytvoření/úpravu šablony -->
    <div id="seznam-modal" class="modal hidden">
        <div class="modal-content large">
            <div class="modal-header">
                <h3 id="seznam-modal-title">Nová šablona seznamu</h3>
                <button class="close-button">&times;</button>
            </div>
            <form id="seznam-form">
                <input type="hidden" id="seznam-id-input">
                <div class="form-group">
                    <label for="seznam-name-input">Název seznamu</label>
                    <input type="text" id="seznam-name-input" required placeholder="Např. Vybavení pro 1. ročník">
                </div>
                <div class="form-group">
                    <label for="seznam-description-input">Popis</label>
                    <textarea id="seznam-description-input" rows="3" placeholder="Krátký popis účelu seznamu..."></textarea>
                </div>
                
                <fieldset class="item-list-fieldset">
                    <legend>Položky na seznamu</legend>
                    <div id="polozky-container" class="form-grid"> 
                        <!-- Dynamicky přidávané položky -->
                    </div>
                    <button type="button" id="add-polozka-btn" class="action-btn small"><i class="fas fa-plus"></i> Přidat položku</button>
                </fieldset>

                <div class="modal-footer">
                    <button type="submit" class="action-btn primary">Uložit šablonu</button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/sprava-nakupniho-seznamu.js"></script>
    <script src="js/custom-select.js"></script>
</body>
</html>
