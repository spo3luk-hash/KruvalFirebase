<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Havraní Pošta - Odeslání svitku</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Nové fonty -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Dancing+Script&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/admin-styles.css">
    <link rel="stylesheet" href="css/custom-select.css">
    <link rel="stylesheet" href="css/sprava-svitku.css">
</head>
<body>
    <div class="admin-container">
        <header class="admin-header">
            <h1>Admin Centrum</h1>
            <h2><i class="fa-solid fa-scroll"></i> Odeslání speciálního svitku</h2>
            <div class="admin-header-actions">
                <a href="admin-centrum.html" class="action-btn"><i class="fas fa-arrow-left"></i> Zpět do centra</a>
            </div>
        </header>

        <main class="admin-main-content">
            <div id="send-scroll-form" class="form-container">
                <div class="form-group">
                    <label for="character-select">Příjemce</label>
                    <div class="custom-select">
                        <select id="character-select" required>
                            <option>Načítám postavy...</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="sender-select">Odesílatel</label>
                    <div class="custom-select">
                        <select id="sender-select" required>
                            <option value="Kruval">Kruval</option>
                            <option value="Ministerstvo kouzel">Ministerstvo kouzel</option>
                            <option value="Nemocnice sv. Munga">Nemocnice sv. Munga</option>
                            <option value="Redakce Denního věštce">Redakce Denního věštce</option>
                            <option value="Anonymní zdroj">Anonymní zdroj</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="scroll-subject">Předmět svitku</label>
                    <input type="text" id="scroll-subject" required placeholder="Např. Pozvánka na turnaj">
                </div>

                <div class="form-group">
                    <label for="scroll-content">Obsah svitku</label>
                    <textarea id="scroll-content" rows="10" required placeholder="Zde napište text, který se na svitku objeví..."></textarea>
                </div>
                
                <div class="signature-grid">
                    <div class="form-group">
                        <label for="scroll-signature">Podpis (nepovinné)</label>
                        <input type="text" id="scroll-signature" placeholder="Např. Albus Brumbál, Ředitel">
                    </div>
                    
                    <div class="form-group">
                        <label for="scroll-seal">Pečeť (nepovinné)</label>
                        <div class="custom-select">
                            <select id="scroll-seal">
                                <option value="zadna">Žádná</option>
                                <option value="kruval_institut">Pečeť Kruvalského Institutu</option>
                                <option value="ministerstvo_kouzel">Pečeť Ministerstva Kouzel</option>
                                <option value="sv_mungo">Znak Nemocnice sv. Munga</option>
                                <option value="denni_vestec">Znak Denního Věštce</option>
                                <option value="anonymni_symbol">Anonymní symbol (oko)</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="submit" id="submit-scroll-btn" class="action-btn primary"><i class="fas fa-feather-alt"></i> Odeslat svitek</button>
                </div>
            </div>
        </main>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/sprava-svitku.js"></script>
    <script src="js/custom-select.js"></script>

</body>
</html>
