<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Správa obchodů</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/sprava-obchodu-dva.css">
</head>
<body>
    <header>
        <h1>Správa obchodů</h1>
        <a href="admin-centrum.html" class="back-to-admin"><i class="fas fa-arrow-left"></i> Zpět do Admin Centra</a>
    </header>

    <main>
        <section id="shops-list-section">
            <h2>Přehled obecných obchodů</h2>
            <button id="add-shop-btn" class="action-btn add-btn"><i class="fas fa-plus"></i> Založit nový obchod</button>
            <div id="shops-list-container" class="table-container"></div>
        </section>

        <section id="other-shops-section">
            <h2>Správa ostatních obchodů</h2>
            <button id="manage-zverimex-btn" class="action-btn edit-btn"><i class="fas fa-paw"></i> Správa Zverimexu</button>
        </section>

        <section id="shop-management-section" class="hidden">
            <button id="back-to-list-btn" class="action-btn"><i class="fas fa-arrow-left"></i> Zpět na seznam</button>
            <h2 id="managing-shop-name"></h2>
            
            <div class="shop-details-form">
                <h3>Detaily obchodu</h3>
                <input type="hidden" id="current-shop-id">
                <div class="form-group">
                    <label for="edit-shop-name">Název</label>
                    <input type="text" id="edit-shop-name">
                </div>
                <div class="form-group">
                    <label for="edit-shop-description">Popis</label>
                    <textarea id="edit-shop-description" rows="3"></textarea>
                </div>
                <button id="save-shop-details-btn" class="action-btn save-btn"><i class="fas fa-save"></i> Uložit detaily</button>
            </div>

            <div class="items-management">
                <h3>Položky v obchodě</h3>
                <button id="add-item-btn" class="action-btn add-btn"><i class="fas fa-plus"></i> Přidat položku z knihovny</button>
                <div id="items-list-container" class="table-container">
                    <!-- Seznam položek obchodu se vygeneruje zde -->
                </div>
            </div>
        </section>
    </main>

    <!-- Modální okno pro přidání/editaci OBCHODU -->
    <div id="shop-modal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="shop-modal-title">Založit nový obchod</h2>
                <button class="close-button">&times;</button>
            </div>
            <div class="modal-body">
                <form id="shop-form">
                    <div class="form-group">
                        <label for="shop-name-input">Název obchodu</label>
                        <input type="text" id="shop-name-input" required>
                    </div>
                    <div class="form-group">
                        <label for="shop-description-input">Popis obchodu</label>
                        <textarea id="shop-description-input" rows="4"></textarea>
                    </div>
                    <button type="submit" class="action-btn save-btn">Uložit</button>
                </form>
            </div>
        </div>
    </div>

    <!-- NOVÉ Modální okno pro přidání položky z KNIHOVNY -->
    <div id="add-item-from-master-modal" class="modal hidden">
        <div class="modal-content large">
            <div class="modal-header">
                <h2>Přidat položku z knihovny</h2>
                <button class="close-button">&times;</button>
            </div>
            <div class="modal-body">
                <div id="master-item-selection-container" class="table-container">
                    <!-- Seznam master předmětů pro výběr se načte zde -->
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/sprava-obchodu.js"></script>
</body>
</html>
