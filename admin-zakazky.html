<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Centrum - Správa Zakázek</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.0/css/all.min.css">
    <!-- Styly pro obecný vzhled admin centra -->
    <link rel="stylesheet" href="css/admin-centrum.css?v=2.5">
    <!-- Unikátní styl pro zakázky -->
    <link rel="stylesheet" href="css/nastenka-pricnaulice.css?v=1.0">
</head>
<body>
    <div class="admin-layout-simple">
        <main class="admin-content">
            <header class="admin-header">
                <h1>Správa Zakázek na Příčné ulici</h1>
                <p>Nástroj pro kompletní životní cyklus zakázky - od vytvoření, přes spuštění, až po finální vyhodnocení a odměnění zúčastněných postav.</p>
                 <a href="admin-centrum.html" class="submit-btn" style="display: inline-block; text-align: center; margin-top: 15px;"><i class="fas fa-arrow-left"></i> Zpět do Admin Centra</a>
            </header>

            <section class="admin-section">
                <h2>Vytvořit novou zakázku</h2>
                <form id="form-vytvorit-zakazku" class="post-form">
                    <div class="form-group">
                        <label for="nazev">Název zakázky</label>
                        <input type="text" id="nazev" name="nazev" required>
                    </div>
                    <div class="form-group">
                        <label for="popis">Popis</label>
                        <textarea id="popis" name="popis" rows="3" required></textarea>
                    </div>
                    <div class="form-group">
                        <label for="zadavatel">Zadavatel</label>
                        <input type="text" id="zadavatel" name="zadavatel" value="Příčná ulice" required>
                    </div>
                    <div class="form-group-inline">
                        <div class="form-group">
                            <label for="odmena">Odměna (Galeony)</label>
                            <input type="number" id="odmena" name="odmena" min="1" required>
                        </div>
                        <div class="form-group">
                            <label for="kapacita">Kapacita (postavy)</label>
                            <input type="number" id="kapacita" name="kapacita" min="1" value="10" required>
                        </div>
                        <div class="form-group">
                            <label for="trvani">Trvání (minuty)</label>
                            <input type="number" id="trvani" name="trvani" min="1" value="15" required>
                        </div>
                    </div>
                    <button type="submit" class="submit-btn">Vytvořit a vypsat zakázku</button>
                </form>
            </section>

            <section class="admin-section">
                <h2>Přehled vypsaných a probíhajících zakázek</h2>
                <!-- Používám ID, na které cílí tvůj unikátní CSS soubor -->
                <div id="dostupne-zakazky-container">
                    <p>Načítám zakázky...</p>
                </div>
            </section>
        </main>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="js/firebase-config.js?v=1.3"></script>
    <script src="js/admin-auth.js?v=1.1"></script>
    <script src="js/admin-zakazky.js?v=1.2"></script>
</body>
</html>
